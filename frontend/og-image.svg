<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="4" fill="#2563eb"/>

  <!-- grid lines -->
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#f3f4f6" stroke-width="1"/>

  <!-- logo -->
  <text x="80" y="100" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#111827">codong<tspan fill="#2563eb">.org</tspan></text>

  <!-- main title -->
  <text x="80" y="220" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#111827">URL Shortener</text>
  <text x="80" y="300" font-family="Georgia, serif" font-size="40" font-weight="400" fill="#6b7280">短链接生成</text>

  <!-- stat bar -->
  <rect x="80" y="370" width="440" height="80" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="110" y="400" font-family="'Courier New', monospace" font-size="13" fill="#2563eb" font-weight="700">CODONG</text>
  <text x="110" y="432" font-family="'Courier New', monospace" font-size="42" font-weight="700" fill="#2563eb">42 lines</text>

  <rect x="540" y="370" width="200" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="400" font-family="'Courier New', monospace" font-size="11" fill="#9ca3af">Python</text>
  <text x="560" y="432" font-family="'Courier New', monospace" font-size="28" font-weight="600" fill="#6b7280">~90</text>

  <rect x="760" y="370" width="180" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="780" y="400" font-family="'Courier New', monospace" font-size="11" fill="#9ca3af">Go</text>
  <text x="780" y="432" font-family="'Courier New', monospace" font-size="28" font-weight="600" fill="#6b7280">~110</text>

  <rect x="960" y="370" width="180" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="980" y="400" font-family="'Courier New', monospace" font-size="11" fill="#9ca3af">JavaScript</text>
  <text x="980" y="432" font-family="'Courier New', monospace" font-size="28" font-weight="600" fill="#6b7280">~95</text>

  <!-- tagline -->
  <text x="80" y="530" font-family="-apple-system, sans-serif" font-size="20" fill="#9ca3af">No frameworks. No boilerplate. Built-in db + http. Open Source · MIT</text>

  <!-- bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#2563eb" opacity="0.15"/>
</svg>
